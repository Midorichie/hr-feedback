[project]
name = "hr-feedback"
authors = []
description = "A decentralized HR performance review and feedback system with rewards"
telemetry = false
requirements = []
boot_contracts = ["pox", "costs-v2", "bns"]

[contracts.hr-feedback]
path = "contracts/hr-feedback.clar"
depends_on = []

[contracts.rewards]
path = "contracts/rewards.clar"
depends_on = ["hr-feedback"]

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
